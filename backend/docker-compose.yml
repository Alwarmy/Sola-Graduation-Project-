version: "3.8"

services:
  db:
    image: postgres:15
    container_name: sola-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sola
    ports:
      - "5432:5432"
    volumes:
      - sola_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sola"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  sola_postgres_data: