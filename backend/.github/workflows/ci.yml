name: CI

on:
  push:
  pull_request:

jobs:
  fast-checks:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite+pysqlite:///:memory:
      JWT_SECRET: ci-test-secret
      REFRESH_TOKEN_SECRET: ci-refresh-secret
      APP_TIMEZONE: Asia/Riyadh
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fast checks
        run: python -m pytest -m "not integration"

  integration:
    runs-on: ubuntu-latest
    needs: fast-checks
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sola_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d sola_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sola_test
      INTEGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sola_test
      JWT_SECRET: ci-test-secret
      REFRESH_TOKEN_SECRET: ci-refresh-secret
      APP_TIMEZONE: Asia/Riyadh
      RATE_LIMIT_BACKEND: memory
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply migrations
        run: alembic upgrade head

      - name: Run integration checks
        run: python -m pytest -m integration
